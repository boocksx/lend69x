<html lang="en">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#f5f5f5,#e9e9e9);
color:#111;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:700px;
padding:20px;
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
margin:0;
font-size:22px;
}

.header p{
margin:5px 0 0;
font-size:14px;
opacity:0.6;
}

.card{
background:#fff;
border-radius:14px;
overflow:hidden;
margin-bottom:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card img{
width:100%;
display:block;
}

.caption{
padding:12px 14px;
font-size:14px;
color:#444;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

@media(min-width:700px){
.grid{
grid-template-columns:1fr 1fr;
}
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>Visual Collection</h1>
<p>Curated gallery update</p>
</div>

<div class="grid">

<div class="card">
<img src="https://i.postimg.cc/D03Vc1PY/photo-2026-06-26-01-21-01.jpg">
<div class="caption">Scene 01 — premium lifestyle moment</div>
</div>

<div class="card">
<img src="https://i.postimg.cc/sDcFpQGr/photo-2026-06-26-01-21-18.jpg">

</div>

<div class="card">
<img src="https://i.postimg.cc/bNTXQDDC/photo-2026-06-26-01-21-16.jpg">
<div class="caption">Scene 03 — visual highlight</div>
</div>

<div class="card">
<img src="https://i.postimg.cc/VL1QrB6V/photo-2026-06-26-01-21-13.jpg">

</div>

<div class="card">
<img src="https://i.postimg.cc/gkdFXqJX/photo-2026-06-26-01-21-11.jpg">

</div>
